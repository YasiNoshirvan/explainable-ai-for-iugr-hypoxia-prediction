data:
  input_path: "demo_data/synthetic_sample.csv"
  label_column: "Status"
  id_columns:
    - "CaseID"

features:
  original:
    - "Gestational_Age"
    - "Maternal_Age"
    - "PI_MCA"
    - "PI_UA"
    - "PI_MCA_UA"

  engineered:
    - "PI_Diff"
    - "PI_MCA_UA_Product"
    - "GA_MCA_Interaction"
    - "UA_Adjusted"

target:
  positive_label: "IUGR"
  negative_label: "Normal"

validation:
  test_size: 0.20
  random_state: 42
  n_splits: 5

ga_stratification:
  start_bins: 4
  min_samples_per_group: 10

thresholds:
  default_target_sensitivity: 0.90
  fixed_threshold: 0.50

clinical_rules:
  pi_ua_high: 1.5
  pi_mca_low: 1.0
  pi_mca_ua_low: 1.0

outputs:
  tables_dir: "outputs/tables"
  figures_dir: "outputs/figures"
